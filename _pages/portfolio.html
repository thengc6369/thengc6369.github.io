<div id="mars-clock" style="
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 14px;
  max-width: 290px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
">
  <div style="font-size: 1.1em; font-weight: 700;">Current Mars Date</div>
  <div id="mars-year">Mars Year: ...</div>
  <div id="mars-ls">Ls: ...</div>
  <div id="mars-sol-year">Sol of Mars Year: ...</div>
  <div id="earth-utc" style="font-size: 0.85em; color: #666;"></div>
</div>

<script>
function mod360(x) {
  return ((x % 360) + 360) % 360;
}

function julianDateUTC(date) {
  return date.getTime() / 86400000 + 2440587.5;
}

/*
  TT - UTC = 69.184 s for current dates:
  TAI - UTC = 37 s, plus TT - TAI = 32.184 s.
  Update this if a future leap second changes TAI - UTC.
*/
function ttMinusUtcSeconds(date) {
  return 69.184;
}

function marsLsAndMSD(date) {
  const jdUTC = julianDateUTC(date);
  const jdTT = jdUTC + ttMinusUtcSeconds(date) / 86400.0;
  const d = jdTT - 2451545.0;

  /*
    NASA Mars24-style equations for Mars solar longitude Ls.
    Reference:
    https://www.giss.nasa.gov/tools/mars24/help/algorithm.html
  */

  const M = mod360(19.3871 + 0.52402073 * d);
  const alphaFMS = mod360(270.3871 + 0.524038496 * d);

  const pbs =
    0.0071 * Math.cos((0.985626 * d / 2.2353 + 49.409) * Math.PI / 180) +
    0.0057 * Math.cos((0.985626 * d / 2.7543 + 168.173) * Math.PI / 180) +
    0.0039 * Math.cos((0.985626 * d / 1.1177 + 191.837) * Math.PI / 180) +
    0.0037 * Math.cos((0.985626 * d / 15.7866 + 21.736) * Math.PI / 180) +
    0.0021 * Math.cos((0.985626 * d / 2.1354 + 15.704) * Math.PI / 180) +
    0.0020 * Math.cos((0.985626 * d / 2.4694 + 95.528) * Math.PI / 180) +
    0.0018 * Math.cos((0.985626 * d / 32.8493 + 49.095) * Math.PI / 180);

  const Mrad = M * Math.PI / 180;

  const nuMinusM =
    (10.691 + 3.0e-7 * d) * Math.sin(Mrad) +
    0.623  * Math.sin(2 * Mrad) +
    0.050  * Math.sin(3 * Mrad) +
    0.005  * Math.sin(4 * Mrad) +
    0.0005 * Math.sin(5 * Mrad) +
    pbs;

  const Ls = mod360(alphaFMS + nuMinusM);

  /*
    Mars Sol Date, following the Mars24 convention.
    This is used internally to calculate sol-of-year.
  */
  const MSD =
    ((jdTT - 2451549.5) / 1.0274912517) +
    44796.0 -
    0.0009626;

  return { Ls, MSD };
}

/*
  Mars Year is assigned from known Ls = 0 Mars New Year dates.

  Month numbers in JavaScript Date.UTC are zero-based:
  1 = February, 10 = November, 11 = December, etc.
*/
const marsYearBoundaries = [
  {
    my: 36,
    start: Date.UTC(2021, 1, 7, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2021, 1, 7, 0, 0, 0))).MSD
  },
  {
    my: 37,
    start: Date.UTC(2022, 11, 26, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2022, 11, 26, 0, 0, 0))).MSD
  },
  {
    my: 38,
    start: Date.UTC(2024, 10, 12, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2024, 10, 12, 0, 0, 0))).MSD
  },
  {
    my: 39,
    start: Date.UTC(2026, 8, 30, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2026, 8, 30, 0, 0, 0))).MSD
  },
  {
    my: 40,
    start: Date.UTC(2028, 7, 17, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2028, 7, 17, 0, 0, 0))).MSD
  },
  {
    my: 41,
    start: Date.UTC(2030, 6, 5, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2030, 6, 5, 0, 0, 0))).MSD
  },
  {
    my: 42,
    start: Date.UTC(2032, 4, 22, 0, 0, 0),
    msd0: marsLsAndMSD(new Date(Date.UTC(2032, 4, 22, 0, 0, 0))).MSD
  }
];

function marsYearInfoFromDate(date) {
  const t = date.getTime();
  let current = null;

  for (const boundary of marsYearBoundaries) {
    if (t >= boundary.start) {
      current = boundary;
    } else {
      break;
    }
  }

  return current;
}

function updateMarsClock() {
  const now = new Date();
  const { Ls, MSD } = marsLsAndMSD(now);
  const MYinfo = marsYearInfoFromDate(now);

  document.getElementById("mars-year").textContent =
    MYinfo === null ? "Mars Year: outside table range" : "Mars Year: " + MYinfo.my;

  document.getElementById("mars-ls").textContent =
    "Ls: " + Ls.toFixed(3) + "°";

  if (MYinfo === null) {
    document.getElementById("mars-sol-year").textContent =
      "Sol of Mars Year: outside table range";
  } else {
    const solOfYear = MSD - MYinfo.msd0;

    document.getElementById("mars-sol-year").textContent =
      "Sol of Mars Year: " + solOfYear.toFixed(2);
  }

  document.getElementById("earth-utc").textContent =
    "Updated: " + now.toISOString().replace("T", " ").slice(0, 19) + " UTC";
}

updateMarsClock();
setInterval(updateMarsClock, 1000);
</script>
